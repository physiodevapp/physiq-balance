name: Deploy to PhysiQ hub

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout physiq-balance
        uses: actions/checkout@v4

      - name: Checkout physiq hub
        uses: actions/checkout@v4
        with:
          repository: physiodevapp/physiq
          token: ${{ secrets.PHYSIQ_DEPLOY_TOKEN }}
          path: physiq-hub

      - name: Copy files to hub
        run: |
          rm -rf physiq-hub/balance
          mkdir -p physiq-hub/balance/lib physiq-hub/balance/icons
          cp index.html app.js sw.js manifest.json favicon.svg .nojekyll physiq-hub/balance/
          [ -d icons ] && cp icons/*.png physiq-hub/balance/icons/ || true
          cp lib/session.js physiq-hub/balance/lib/

      - name: Commit and push
        working-directory: physiq-hub
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A balance/
          git diff --cached --quiet || git commit -m "chore: update balance from physiq-balance@${{ github.sha }}"
          git push
